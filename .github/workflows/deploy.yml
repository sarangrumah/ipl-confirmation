name: Deploy to VPS

# Trigger: only on push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (needed for diff/audit only — actual code is pulled on VPS) ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Connect to VPS and run deploy.sh ──────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.VPS_HOST }}
          username:    ${{ secrets.VPS_USERNAME }}
          key:         ${{ secrets.VPS_SSH_KEY }}
          port:        22
          script_stop: true   # abort if any command in the script fails
          script: |
            echo "── Connected to VPS as $(whoami) ──"
            bash /var/www/ipl_confirmation/deploy.sh
